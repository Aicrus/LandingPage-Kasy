      <stop offset="0%" stop-color="#0c1626"/>
      <stop offset="60%" stop-color="#080c16"/>
      <stop offset="100%" stop-color="#05060b"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#g)"/>
  <!-- halo ring -->
  <circle cx="800" cy="380" r="170" fill="none" stroke="#3de0ff" stroke-width="3" opacity="0.85"/>
  <circle cx="800" cy="380" r="170" fill="#3de0ff" opacity="0.05"/>
  <!-- figure silhouette -->
  <g fill="#10141e" stroke="#2c3852" stroke-width="1.5">
    <circle cx="800" cy="300" r="26"/>
    <rect x="770" y="334" width="60" height="110" rx="28"/>
    <rect x="744" y="344" width="18" height="96" rx="9" transform="rotate(8 753 392)"/>
    <rect x="838" y="344" width="18" height="96" rx="9" transform="rotate(-8 847 392)"/>
    <rect x="778" y="448" width="18" height="116" rx="9"/>
    <rect x="804" y="448" width="18" height="116" rx="9"/>
  </g>
  <!-- visor -->
  <rect x="782" y="292" width="36" height="9" rx="4" fill="#3de0ff"/>
  <ellipse cx="800" cy="572" rx="110" ry="14" fill="#000" opacity="0.5"/>
  <ellipse cx="800" cy="568" rx="80" ry="9" fill="#3de0ff" opacity="0.08"/>
  <text x="800" y="700" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="26" letter-spacing="14" fill="#8b95ad">FIGURE</text>
  <text x="800" y="742" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="15" letter-spacing="6" fill="#525c72">IV · THE AVATAR</text>
</svg>
